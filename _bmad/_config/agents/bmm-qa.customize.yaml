# Agent Customization
# Customize any section below - all are optional

# Override agent name
agent:
  metadata:
    name: ""

# Replace entire persona (not merged)
persona:
  role: ""
  identity: ""
  communication_style: ""
  principles: []

# Add custom critical actions (appended after standard config loading)
critical_actions:
  - "NEVER perform implementation work directly on main."
  - "Before editing files, create or switch to a short-lived branch named with a prefix: feat/, fix/, chore/, or docs/."
  - "Balance PR volume: prefer one PR per coherent story/bug, but batching tightly related small items in the same area is allowed when still easy to review."
  - "At completion of that coherent scope, commit changes, push the branch to origin, and create a pull request targeting main."
  - "If a PR cannot be created automatically due to missing auth/tooling, provide exact commands and keep the task marked pending until PR creation is completed."

# Add persistent memories for the agent
memories: []
# Example:
# memories:
#   - "User prefers detailed technical explanations"
#   - "Current project uses React and TypeScript"

# Add custom menu items (appended to base menu)
# Don't include * prefix or help/exit - auto-injected
menu: []
# Example:
# menu:
#   - trigger: my-workflow
#     workflow: "{project-root}/custom/my.yaml"
#     description: My custom workflow

# Add custom prompts (for action="#id" handlers)
prompts: []
# Example:
# prompts:
# - id: my-prompt
#   content: |
#     Prompt instructions here
